# Builds the RuneLite plugin on every push that touches it, against the REAL
# RuneLite client jar — so nobody needs a local Java toolchain to know the
# plugin compiles. Green check = ready for Plugin Hub submission.
name: Build RuneLite plugin

on:
  push:
    paths:
      - 'runelite-plugin/**'
      - '.github/workflows/plugin-build.yml'
  pull_request:
    paths:
      - 'runelite-plugin/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
      - name: Build and test plugin
        working-directory: runelite-plugin
        run: gradle build --no-daemon
      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: pocketge-flip-tracker
          path: runelite-plugin/build/libs/*.jar
          if-no-files-found: warn
